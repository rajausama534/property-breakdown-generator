<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Breakdown Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0b0f14;
      font-family: Poppins, sans-serif;
      color: #111827;
    }

    .app {
      display: grid;
      grid-template-columns: 430px 1fr;
      min-height: 100vh;
    }

    .panel {
      background: #111827;
      color: #fff;
      padding: 24px;
      overflow-y: auto;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .panel h1 {
      font-size: 22px;
      margin: 0 0 20px;
    }

    .section-title {
      margin: 22px 0 10px;
      font-size: 14px;
      color: #93c5fd;
      font-weight: 800;
      text-transform: uppercase;
    }

    label {
      font-size: 12px;
      color: #cbd5e1;
      display: block;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #fff;
      margin-bottom: 10px;
      font-family: Poppins, sans-serif;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 13px;
      border: 0;
      border-radius: 9px;
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
    }

    button.secondary { background: #334155; }
    button.danger { background: #dc2626; }
    button.small {
      width: auto;
      padding: 7px 10px;
      font-size: 12px;
      margin: 4px 4px 4px 0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
      border-bottom: 1px solid #1f2937;
      padding-bottom: 8px;
    }

    .image-control {
      background: #020617;
      border: 1px solid #334155;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .preview-wrap {
      padding: 35px;
      overflow: auto;
    }

    #presentation {
      width: 900px;
      background: #fff;
      margin: auto;
      padding: 55px 70px;
      min-height: 1200px;
    }

    .top-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #2b2f33;
    }

    .date {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 30px;
    }

    .details {
      font-family: Georgia, serif;
      font-size: 23px;
      line-height: 1.9;
      font-weight: 700;
      font-style: italic;
      margin-left: 30px;
    }

    .details li {
      padding-left: 15px;
      margin-bottom: 10px;
    }

    hr {
      border: 0;
      border-top: 1px solid #cbd5e1;
      margin: 35px 120px;
    }

    .quote {
      font-family: Georgia, serif;
      font-size: 22px;
      line-height: 1.75;
      font-style: italic;
      border-left: 5px solid #111;
      padding-left: 22px;
      margin: 25px 0;
      color: #333;
      white-space: pre-line;
    }

    .selling {
      font-family: Georgia, serif;
      font-size: 21px;
      margin: 20px 0 25px 28px;
    }

    .pay-title {
      font-size: 28px;
      font-weight: 800;
      margin: 25px 0 18px;
      color: #3b3f44;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 22px;
      font-family: Arial, sans-serif;
    }

    td {
      border: 1px solid #333;
      padding: 8px;
    }

    .gray { background: #d9d9d9; font-weight: 800; }
    .pink { background: #f8d6d3; font-weight: 800; }
    .green { background: #d6f0dd; font-weight: 800; }
    .right { text-align: right; }

    .section-heading {
      font-size: 28px;
      font-weight: 800;
      margin: 40px 0 18px;
      color: #2b2f33;
    }

    .floor-plan img {
      width: 100%;
      border: 1px solid #ddd;
    }

    .image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 15px;
    }

    .image-grid img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    @media(max-width: 1000px) {
      .app { grid-template-columns: 1fr; }
      .panel { position: relative; height: auto; }
      #presentation { width: 100%; padding: 35px 25px; }
      .preview-wrap { padding: 10px; }
    }

    @media print {
      body {
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .panel { display: none; }
      .app { display: block; }
      .preview-wrap { padding: 0; }
      #presentation {
        width: 900px;
        margin: auto;
        padding: 55px 70px;
      }
    }
  </style>
</head>

<body>

<div class="app">

  <div class="panel">
    <h1>🔥 Property Breakdown Generator</h1>

    <div class="section-title">Heading</div>
    <label>Title</label>
    <input id="title" value="🔥 HOT LOT: 7-BR IN LAVITA - AMAN">

    <label>Date</label>
    <input id="date" value="March 03, 2026">

    <div class="section-title">Property Details</div>
    <label>Project</label><input id="project" value="Lavita - Aman">
    <label>Developer</label><input id="developer" value="Emaar">
    <label>Area</label><input id="area" value="The Oasis">
    <label>Type</label><input id="type" value="Villa · Single row">
    <label>Bedrooms</label><input id="bedrooms" value="7-BR">
    <label>Plot Size</label><input id="plot" value="33,657 sq.ft">
    <label>BUA</label><input id="bua" value="27,517 sq.ft">
    <label>Floor</label><input id="floor" value="B+G+1+R">
    <label>View</label><input id="view" value="Park & Lagoon">
    <label>Features</label><input id="features" value="Balcony · Parking · Pool ✔">
    <label>Handover</label><input id="handover" value="Q2 2027">

    <div class="section-title">About Property</div>
    <textarea id="description">This villa was purchased exclusively for investment purposes, and its current price is considered a low price for such a large property in one of the most promising projects today by the developer Emaar.</textarea>

    <div class="section-title">Payment Breakdown</div>

    <label>Selling Price</label>
    <input id="price" type="number" value="67000000">

    <label>Payment to Seller</label>
    <input id="seller" type="number" value="33364068">

    <div class="section-title">Remaining Installments</div>
    <div id="installments"></div>
    <button onclick="addInstallment()" class="secondary">+ Add Installment</button>

    <div class="section-title">Floor Plan</div>
    <input type="file" id="floorUpload" accept="image/*">
    <button onclick="removeFloorPlan()" class="danger">Remove Floor Plan</button>

    <div class="section-title">Property Images</div>
    <input type="file" id="imagesUpload" accept="image/*" multiple>
    <div id="imageControls"></div>

    <button onclick="generate()">Generate Preview</button>
    <button onclick="downloadPDF()" class="secondary">Download / Print PDF</button>
  </div>

  <div class="preview-wrap">
    <div id="presentation"></div>
  </div>

</div>

<script>
  let floorPlanSrc = "";
  let propertyImages = [];

  let installments = [
    { date: "2-APR-2026", amount: 5605989 },
    { date: "5-SEP-2026", amount: 5605989 },
    { date: "9-MAR-2027", amount: 5605989 },
    { date: "29-OCT-2027", amount: 5605989 },
    { date: "31-DEC-2028", amount: 11211976 }
  ];

  function money(num) {
    return "AED " + Number(num || 0).toLocaleString("en-US", {
      maximumFractionDigits: 0
    });
  }

  function get(id) {
    return document.getElementById(id).value.trim();
  }

  function number(id) {
    return Number(document.getElementById(id).value || 0);
  }

  function addDetail(items, label, value) {
    if (value && value.trim() !== "") {
      items.push(`<li>${label} – ${value}</li>`);
    }
  }

  function renderInstallments() {
    const box = document.getElementById("installments");
    box.innerHTML = "";

    installments.forEach((item, index) => {
      box.innerHTML += `
        <div class="row">
          <div>
            <label>Date</label>
            <input value="${item.date}" oninput="installments[${index}].date=this.value; generate();">
          </div>
          <div>
            <label>Amount</label>
            <input type="number" value="${item.amount}" oninput="installments[${index}].amount=Number(this.value); generate();">
          </div>
          <button class="small danger" onclick="removeInstallment(${index})">Remove</button>
        </div>
      `;
    });
  }

  function addInstallment() {
    installments.push({ date: "", amount: 0 });
    renderInstallments();
    generate();
  }

  function removeInstallment(index) {
    installments.splice(index, 1);
    renderInstallments();
    generate();
  }

  document.getElementById("floorUpload").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      floorPlanSrc = event.target.result;
      generate();
    };
    reader.readAsDataURL(file);
  });

  function removeFloorPlan() {
    floorPlanSrc = "";
    document.getElementById("floorUpload").value = "";
    generate();
  }

  document.getElementById("imagesUpload").addEventListener("change", function(e) {
    const files = Array.from(e.target.files);

    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = function(event) {
        propertyImages.push({
          name: file.name,
          src: event.target.result
        });
        renderImageControls();
        generate();
      };
      reader.readAsDataURL(file);
    });

    e.target.value = "";
  });

  function renderImageControls() {
    const box = document.getElementById("imageControls");
    box.innerHTML = "";

    propertyImages.forEach((img, index) => {
      box.innerHTML += `
        <div class="image-control">
          ${index + 1}. ${img.name || "Image"}
          <br>
          <button class="small secondary" onclick="moveImage(${index}, -1)">Up</button>
          <button class="small secondary" onclick="moveImage(${index}, 1)">Down</button>
          <button class="small danger" onclick="removeImage(${index})">Remove</button>
        </div>
      `;
    });
  }

  function removeImage(index) {
    propertyImages.splice(index, 1);
    renderImageControls();
    generate();
  }

  function moveImage(index, direction) {
    const newIndex = index + direction;
    if (newIndex < 0 || newIndex >= propertyImages.length) return;

    const temp = propertyImages[index];
    propertyImages[index] = propertyImages[newIndex];
    propertyImages[newIndex] = temp;

    renderImageControls();
    generate();
  }

  function generate() {
    const price = number("price");
    const seller = number("seller");

    const dld = price * 0.04 + 40;
    const trusteeOffice = 4200;
    const titleDeed = 550 * 1.05;
    const trusteeTotal = trusteeOffice + titleDeed;

    const commission = price * 0.02;
    const commissionVat = commission * 0.05;
    const totalCommission = commission + commissionVat;

    const validInstallments = installments.filter(i => i.date.trim() !== "" || Number(i.amount) > 0);
    const remaining = validInstallments.reduce((sum, i) => sum + Number(i.amount || 0), 0);

    const totalTransfer = seller + dld + trusteeTotal + totalCommission;
    const totalCost = totalTransfer + remaining;

    let details = [];
    addDetail(details, "Project", get("project"));
    addDetail(details, "Developer", get("developer"));
    addDetail(details, "Area", get("area"));
    addDetail(details, "Type", get("type"));
    addDetail(details, "Bedrooms", get("bedrooms"));

    const plot = get("plot");
    const bua = get("bua");
    if (plot || bua) {
      details.push(`<li>Size – ${plot ? "Plot " + plot : ""}${plot && bua ? " · " : ""}${bua ? "BUA " + bua : ""}</li>`);
    }

    addDetail(details, "Floor", get("floor"));
    addDetail(details, "View", get("view"));

    const features = get("features");
    if (features) details.push(`<li>${features}</li>`);

    addDetail(details, "Handover", get("handover"));

    const detailHtml = details.length ? `<ul class="details">${details.join("")}</ul><hr>` : "";

    const description = get("description");
    const descriptionHtml = description ? `<div class="quote">${description}</div><hr>` : "";

    const installmentRows = validInstallments.length ? `
      <tr class="green">
        <td colspan="2">Payment Plan:</td>
      </tr>
      ${validInstallments.map(i => `
        <tr>
          <td>${i.date}</td>
          <td class="right">${money(i.amount)}</td>
        </tr>
      `).join("")}
      <tr><td colspan="2">&nbsp;</td></tr>
    ` : "";

    const floorHtml = floorPlanSrc ? `
      <div class="section-heading">Floor Plan</div>
      <div class="floor-plan">
        <img src="${floorPlanSrc}">
      </div>
    ` : "";

    const imagesHtml = propertyImages.length ? `
      <div class="section-heading">Property Images</div>
      <div class="image-grid">
        ${propertyImages.map(img => `<img src="${img.src}">`).join("")}
      </div>
    ` : "";

    document.getElementById("presentation").innerHTML = `
      ${get("title") ? `<div class="top-title">${get("title")}</div>` : ""}
      ${get("date") ? `<div class="date">${get("date")}</div>` : ""}

      ${detailHtml}

      ${descriptionHtml}

      ${price ? `<div class="selling">• Selling price: ${money(price)}</div>` : ""}

      <div class="pay-title">📑 PAYMENT PLAN (AED)</div>

      <table>
        <tr class="gray">
          <td>UNIT PRICE:</td>
          <td class="right">${money(price)}</td>
        </tr>

        <tr><td colspan="2">&nbsp;</td></tr>

        <tr class="pink">
          <td colspan="2">Payments on Transfer:</td>
        </tr>

        ${seller ? `
          <tr>
            <td>1. Payment to seller</td>
            <td class="right">${money(seller)}</td>
          </tr>
        ` : ""}

        <tr>
          <td>DLD Transfer fee 4% + AED 40</td>
          <td class="right">${money(dld)}</td>
        </tr>

        <tr>
          <td>Trustee Office Fee AED 4,200 + Title Deed AED 550 + 5% VAT</td>
          <td class="right">${money(trusteeTotal)}</td>
        </tr>

        <tr>
          <td>Buyer's agent commission 2% + 5% VAT</td>
          <td class="right">${money(totalCommission)}</td>
        </tr>

        <tr><td colspan="2">&nbsp;</td></tr>

        ${installmentRows}

        <tr class="pink">
          <td>Total on Transfer:</td>
          <td class="right">${money(totalTransfer)}</td>
        </tr>

        ${remaining ? `
          <tr class="green">
            <td>Total remaining Payment Plan:</td>
            <td class="right">${money(remaining)}</td>
          </tr>
        ` : ""}

        <tr class="gray">
          <td>TOTAL COST FOR BUYER:</td>
          <td class="right">${money(totalCost)}</td>
        </tr>
      </table>

      ${floorHtml}
      ${imagesHtml}
    `;
  }

  function downloadPDF() {
    generate();
    window.print();
  }

  document.querySelectorAll("input, textarea").forEach(el => {
    el.addEventListener("input", generate);
  });

  renderInstallments();
  renderImageControls();
  generate();
</script>

</body>
</html>
