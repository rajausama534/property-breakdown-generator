<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Property Presentation Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f172a;color:#fff;}

.container{display:flex;height:100vh;}
.left{width:380px;padding:20px;overflow:auto;background:#111827;}
.right{flex:1;background:#f8fafc;color:#000;padding:30px;overflow:auto;}

input,textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#020617;
color:#fff;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
font-weight:600;
}

.preview{
background:#fff;
padding:25px;
border-radius:12px;
color:#000;
max-width:800px;
margin:auto;
}

.title{font-size:28px;font-weight:700;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.box{background:#f1f5f9;padding:12px;border-radius:8px;}
.box small{color:#64748b;}
.box b{display:block;margin-top:5px;}

.section{margin-top:25px;}
.section h3{margin-bottom:10px;}

.pay{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e2e8f0;}

.whatsapp{
margin-top:20px;
display:inline-block;
background:#22c55e;
color:#fff;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{
background:#020617;
padding:30px;
border-radius:12px;
width:320px;
}

</style>
</head>

<body>

<div id="loginPage" class="login">
  <div class="login-box">
    <h2>Login</h2>
    <input id="email" placeholder="Email"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="app" class="container" style="display:none;">

<div class="left">

<input id="title" placeholder="Title"/>
<input id="project" placeholder="Project"/>
<input id="developer" placeholder="Developer"/>
<input id="area" placeholder="Area"/>
<input id="type" placeholder="Type"/>
<input id="bedrooms" placeholder="Bedrooms"/>
<input id="bathrooms" placeholder="Bathrooms"/>
<input id="size" placeholder="Size"/>
<input id="floor" placeholder="Floor"/>
<input id="view" placeholder="View"/>
<input id="completion" placeholder="Completion"/>

<textarea id="desc" placeholder="Description"></textarea>

<h4>Payment</h4>
<input id="price" placeholder="Selling Price" oninput="calc()"/>
<input id="seller" placeholder="Payment to Seller"/>
<input id="dld" placeholder="DLD Fee"/>
<input id="commission" placeholder="Brokerage Fee"/>
<input id="trustee" value="4200"/>
<input id="titlefee" value="550"/>

<input id="phone" placeholder="WhatsApp Number (+971...)"/>

<button onclick="updatePreview()">Update Preview</button>
<button onclick="save()">Save & Generate Link</button>
<button onclick="window.print()">Download PDF</button>

</div>

<div class="right">

<div class="preview" id="preview">
<div class="title" id="p_title"></div>

<div class="grid">
<div class="box"><small>Project</small><b id="p_project"></b></div>
<div class="box"><small>Developer</small><b id="p_developer"></b></div>
<div class="box"><small>Area</small><b id="p_area"></b></div>
<div class="box"><small>Type</small><b id="p_type"></b></div>
<div class="box"><small>Bedrooms</small><b id="p_bedrooms"></b></div>
<div class="box"><small>Bathrooms</small><b id="p_bathrooms"></b></div>
<div class="box"><small>Size</small><b id="p_size"></b></div>
<div class="box"><small>Floor</small><b id="p_floor"></b></div>
<div class="box"><small>View</small><b id="p_view"></b></div>
<div class="box"><small>Completion</small><b id="p_completion"></b></div>
</div>

<div class="section">
<p id="p_desc"></p>
</div>

<div class="section">
<h3>Payment Breakdown</h3>
<div class="pay"><span>Price</span><span id="p_price"></span></div>
<div class="pay"><span>Seller</span><span id="p_seller"></span></div>
<div class="pay"><span>DLD</span><span id="p_dld"></span></div>
<div class="pay"><span>Commission</span><span id="p_commission"></span></div>
<div class="pay"><span>Trustee</span><span id="p_trustee"></span></div>
<div class="pay"><span>Title Fee</span><span id="p_titlefee"></span></div>
</div>

<a id="whatsapp" class="whatsapp" target="_blank">WhatsApp Now</a>

</div>

</div>
</div>

<script>
function login(){
document.getElementById('loginPage').style.display='none';
document.getElementById('app').style.display='flex';
}

function calc(){
let price = Number(document.getElementById('price').value);
document.getElementById('dld').value = price * 0.04;
document.getElementById('commission').value = price * 0.02 * 1.05;
}

function updatePreview(){
let v=id=>document.getElementById(id).value;

document.getElementById('p_title').innerText=v('title');
document.getElementById('p_project').innerText=v('project');
document.getElementById('p_developer').innerText=v('developer');
document.getElementById('p_area').innerText=v('area');
document.getElementById('p_type').innerText=v('type');
document.getElementById('p_bedrooms').innerText=v('bedrooms');
document.getElementById('p_bathrooms').innerText=v('bathrooms');
document.getElementById('p_size').innerText=v('size');
document.getElementById('p_floor').innerText=v('floor');
document.getElementById('p_view').innerText=v('view');
document.getElementById('p_completion').innerText=v('completion');
document.getElementById('p_desc').innerText=v('desc');

document.getElementById('p_price').innerText=v('price');
document.getElementById('p_seller').innerText=v('seller');
document.getElementById('p_dld').innerText=v('dld');
document.getElementById('p_commission').innerText=v('commission');
document.getElementById('p_trustee').innerText=v('trustee');
document.getElementById('p_titlefee').innerText=v('titlefee');

let phone=v('phone');
document.getElementById('whatsapp').href=`https://wa.me/${phone}`;
}

function save(){
let data={};
document.querySelectorAll("input,textarea").forEach(el=>data[el.id]=el.value);

let id=Math.random().toString(36).substr(2,9);
localStorage.setItem(id,JSON.stringify(data));

let link=window.location.origin+"/view.html?id="+id;
alert("Link copied:\n"+link);
navigator.clipboard.writeText(link);
}
</script>

</body>
</html>
