<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Property Presentation</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;background:#0b0f14;font-family:Poppins,Arial,sans-serif;color:#111827}
.hidden{display:none!important}
.app{display:grid;grid-template-columns:420px 1fr;min-height:100vh}
.panel{background:#111827;color:#fff;padding:24px;height:100vh;overflow:auto;position:sticky;top:0}
.panel h1{font-size:21px;margin:0 0 18px}
.section{font-size:13px;font-weight:800;color:#93c5fd;margin:22px 0 10px;text-transform:uppercase}
label{font-size:12px;color:#cbd5e1;margin:8px 0 5px;display:block}
input,textarea{width:100%;padding:11px;border-radius:9px;border:1px solid #334155;background:#020617;color:#fff;font-family:Poppins}
textarea{min-height:130px;resize:vertical}
button{border:0;border-radius:9px;padding:11px 13px;font-weight:700;cursor:pointer;background:#2563eb;color:#fff;margin-top:8px}
button.full{width:100%}
button.gray{background:#334155}
button.red{background:#dc2626}
.small{font-size:12px;padding:7px 9px;margin-right:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.itemBox{border:1px solid #334155;background:#020617;padding:10px;border-radius:10px;margin:8px 0}
.previewWrap{padding:35px;overflow:auto}
.loginBox{max-width:420px;margin:80px auto;background:#111827;padding:28px;border-radius:18px;color:#fff}

#presentation{width:950px;background:#fff;margin:auto;padding:55px 65px;box-shadow:0 20px 80px rgba(0,0,0,.25)}
.title{font-size:34px;font-weight:800;letter-spacing:-.5px;margin-bottom:22px;color:#20242a}
.details{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:25px 0}
.detail{border:1px solid #e5e7eb;border-radius:14px;padding:15px 17px;background:#fafafa}
.detail span{display:block;font-size:12px;color:#6b7280;font-weight:700;text-transform:uppercase}
.detail b{font-size:18px;color:#111827}
.desc{font-size:17px;line-height:1.75;color:#333;border-left:4px solid #111827;padding-left:18px;margin:28px 0;white-space:pre-line}
.sectionTitle{font-size:25px;font-weight:800;margin:35px 0 16px;color:#20242a}
.paymentBox{border:1px solid #e5e7eb;border-radius:18px;overflow:hidden;margin-top:15px}
.payRow{display:grid;grid-template-columns:1.3fr .7fr;border-bottom:1px solid #e5e7eb}
.payRow:last-child{border-bottom:0}
.payLabel{padding:16px 18px;font-size:16px;color:#111827}
.payAmount{padding:16px 18px;text-align:right;font-size:17px;font-weight:800;background:#fafafa}
.payHead .payLabel,.payHead .payAmount{background:#f3f4f6;font-size:19px;font-weight:800}
.payPink .payLabel,.payPink .payAmount{background:#fff1f2;font-weight:800}
.payGreen .payLabel,.payGreen .payAmount{background:#ecfdf5;font-weight:800}
.whatsappBtn{display:inline-block;margin-top:25px;background:#16a34a;color:white;text-decoration:none;padding:14px 22px;border-radius:999px;font-weight:800}
.shareBox{background:#020617;border:1px solid #334155;padding:12px;border-radius:10px;margin-top:12px;font-size:13px;word-break:break-all}
.shareBox a{color:#93c5fd}
.mediaGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.mediaCard{position:relative;border-radius:14px;overflow:hidden;border:1px solid #e5e7eb;background:#f8fafc}
.mediaCard.main{grid-column:span 3}
.mediaCard img{width:100%;height:210px;object-fit:cover;display:block}
.mediaCard.main img{height:360px}
.badge{position:absolute;top:12px;left:12px;background:#fff;padding:6px 12px;border-radius:999px;font-weight:800;color:#6d28d9}
.num{position:absolute;bottom:10px;left:10px;background:#000;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800}
.thumb{display:flex;align-items:center;gap:10px}
.thumb img{width:70px;height:55px;object-fit:cover;border-radius:8px}
@media(max-width:1000px){.app{grid-template-columns:1fr}.panel{height:auto;position:relative}#presentation{width:100%;padding:30px 20px}.details{grid-template-columns:1fr}.mediaGrid{grid-template-columns:1fr}.mediaCard.main{grid-column:span 1}.payRow{grid-template-columns:1fr}.payAmount{text-align:left}}
@media print{body{background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}.panel{display:none}.app{display:block}.previewWrap{padding:0}#presentation{width:950px;box-shadow:none;margin:0 auto}}
</style>
</head>

<body>

<div id="loginBox" class="loginBox">
  <h2>Login</h2>
  <label>Email</label>
  <input id="loginEmail" type="email" placeholder="your@email.com">
  <label>Password</label>
  <input id="loginPassword" type="password" placeholder="Password">
  <button class="full" onclick="login()">Login</button>
</div>

<div id="mainApp" class="app hidden">
<div class="panel">
<h1>🔥 Property Presentation Builder</h1>

<button class="gray full" onclick="logout()">Logout</button>

<div class="section">Heading</div>
<label>Title</label><input id="title" value="4-Bedroom in Caya">

<div class="section">Contact Button</div>
<label>WhatsApp Phone Number</label>
<input id="phone" value="971501234567" placeholder="971501234567">

<div class="section">Property Details</div>
<label>Project</label><input id="project" value="Caya">
<label>Developer</label><input id="developer" value="Emaar">
<label>Area</label><input id="area" value="Arabian Ranches 3">
<label>Type</label><input id="type" value="Villa">

<div class="grid2">
<div><label>Bedrooms</label><input id="bedrooms" value="4-BR"></div>
<div><label>Bathrooms</label><input id="bathrooms" value="5"></div>
</div>

<div class="grid2">
<div><label>Plot Size</label><input id="plot" value="2,687 sq.ft"></div>
<div><label>BUA</label><input id="bua" value="4,440 sq.ft"></div>
</div>

<label>Floor</label><input id="floor" value="G+1">

<div class="grid2">
<div><label>View</label><input id="view" value="Community View"></div>
<div><label>Completion</label><input id="completion" value="2025"></div>
</div>

<div class="section">Description</div>
<textarea id="description">Premium villa in a well-established Emaar community with strong end-user demand and long-term investment potential.</textarea>

<div class="section">Payment Breakdown</div>
<label>Selling Price</label><input id="price" type="number" value="10000000">
<label>Payment to Seller</label><input id="seller" type="number" value="1000000">

<div class="grid2">
<div><label>DLD Fee 4%</label><input id="dld" type="number"></div>
<div><label>Brokerage Fee</label><input id="commission" type="number"></div>
</div>

<div class="grid2">
<div><label>Trustee Office Fee</label><input id="trustee" type="number" value="4200"></div>
<div><label>Title Deed Fee</label><input id="titleFee" type="number" value="550"></div>
</div>

<div class="section">Remaining Installments</div>
<div id="installments"></div>
<button class="gray full" onclick="addInstallment()">+ Add Installment</button>

<div class="section">Floor Plans</div>
<input type="file" id="floorUpload" accept="image/*" multiple>
<div id="floorControls"></div>

<div class="section">Property Images</div>
<input type="file" id="imagesUpload" accept="image/*" multiple>
<div id="imageControls"></div>

<button class="full" onclick="generate()">Update Preview</button>
<button class="full" onclick="savePresentation()">Save & Generate Link</button>
<button class="gray full" onclick="window.print()">Download / Print PDF</button>

<div id="shareBox" class="shareBox hidden"></div>
</div>

<div class="previewWrap">
<div id="presentation"></div>
</div>
</div>

<script>
const SUPABASE_URL = "https://cowyowpcktpvnevrmfej.supabase.co";
const SUPABASE_KEY = "sb_publishable_mM2UoFjMfo_eaUPkBd2Nmw_9KBPZEqh";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentId = null;
let floorPlans = [];
let images = [];
let installments = [];

function n(id){return Number(document.getElementById(id).value||0)}
function v(id){return document.getElementById(id).value.trim()}
function money(x){return "AED "+Number(x||0).toLocaleString("en-US",{maximumFractionDigits:0})}

function slugify(text){
  return text.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
}

async function login(){
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;
  const {data,error} = await db.auth.signInWithPassword({email,password});
  if(error){alert(error.message);return}
  currentUser = data.user;
  showApp();
}

async function logout(){
  await db.auth.signOut();
  location.href = "/";
}

function showApp(){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("mainApp").classList.remove("hidden");
}

function autoFees(){
 let price=n("price");
 document.getElementById("dld").value=Math.round(price*0.04);
 document.getElementById("commission").value=Math.round(price*0.02*1.05);
}

function addInstallment(){
 installments.push({date:"",amount:0});
 renderInstallments();
 generate();
}

function removeInstallment(i){
 installments.splice(i,1);
 renderInstallments();
 generate();
}

function renderInstallments(){
 let box=document.getElementById("installments");
 box.innerHTML="";
 installments.forEach((x,i)=>{
  box.innerHTML+=`
  <div class="itemBox">
   <div class="grid2">
    <div><label>Date</label><input value="${x.date}" oninput="installments[${i}].date=this.value;generate()"></div>
    <div><label>Amount</label><input type="number" value="${x.amount}" oninput="installments[${i}].amount=Number(this.value);generate()"></div>
   </div>
   <button class="red small" onclick="removeInstallment(${i})">Remove</button>
  </div>`;
 });
}

function handleFiles(e,target){
 Array.from(e.target.files).forEach(file=>{
  let r=new FileReader();
  r.onload=ev=>{
   target.push({name:file.name,src:ev.target.result});
   renderMediaControls();
   generate();
  };
  r.readAsDataURL(file);
 });
 e.target.value="";
}

document.getElementById("floorUpload").onchange=e=>handleFiles(e,floorPlans);
document.getElementById("imagesUpload").onchange=e=>handleFiles(e,images);

function removeMedia(arr,i){arr.splice(i,1);renderMediaControls();generate()}
function moveMedia(arr,i,d){
 let ni=i+d;if(ni<0||ni>=arr.length)return;
 [arr[i],arr[ni]]=[arr[ni],arr[i]];
 renderMediaControls();
 generate();
}

function renderMediaControls(){
 let f=document.getElementById("floorControls");
 f.innerHTML="";
 floorPlans.forEach((img,i)=>f.innerHTML+=mediaControl("floorPlans",img,i));

 let p=document.getElementById("imageControls");
 p.innerHTML="";
 images.forEach((img,i)=>p.innerHTML+=mediaControl("images",img,i));
}

function mediaControl(arrName,img,i){
 return `<div class="itemBox thumb">
  <img src="${img.src}">
  <div style="flex:1">${i+1}. ${img.name}</div>
  <button class="small gray" onclick="moveMedia(${arrName},${i},-1)">↑</button>
  <button class="small gray" onclick="moveMedia(${arrName},${i},1)">↓</button>
  <button class="small red" onclick="removeMedia(${arrName},${i})">×</button>
 </div>`;
}

function detail(label,value){
 return value?`<div class="detail"><span>${label}</span><b>${value}</b></div>`:"";
}

function mediaGrid(title,arr){
 if(!arr.length)return "";
 return `<div class="sectionTitle">${title}</div>
 <div class="mediaGrid">
 ${arr.map((img,i)=>`
  <div class="mediaCard ${i==0?'main':''}">
   ${i==0?'<div class="badge">★ Main Photo</div>':''}
   <img src="${img.src}">
   <div class="num">${i+1}</div>
  </div>`).join("")}
 </div>`;
}

function payRow(label,amount,cls=""){
 return `<div class="payRow ${cls}">
  <div class="payLabel">${label}</div>
  <div class="payAmount">${money(amount)}</div>
 </div>`;
}

function collectForm(){
  return {
    title:v("title"), phone:v("phone"), project:v("project"), developer:v("developer"),
    area:v("area"), type:v("type"), bedrooms:v("bedrooms"), bathrooms:v("bathrooms"),
    plot:v("plot"), bua:v("bua"), floor:v("floor"), view:v("view"),
    completion:v("completion"), description:v("description"), price:n("price"),
    seller:n("seller"), dld:n("dld"), commission:n("commission"),
    trustee:n("trustee"), titleFee:n("titleFee"), installments, floorPlans, images
  };
}

function fillForm(f){
  Object.keys(f).forEach(key=>{
    const el=document.getElementById(key);
    if(el && typeof f[key] !== "object") el.value=f[key];
  });
  installments=f.installments||[];
  floorPlans=f.floorPlans||[];
  images=f.images||[];
  renderInstallments();
  renderMediaControls();
  generate();
}

function generate(){
 autoFees();

 let price=n("price"), seller=n("seller"), dld=n("dld"), commission=n("commission");
 let trustee=n("trustee"), titleFee=n("titleFee");
 let valid=installments.filter(x=>x.date||x.amount);
 let remaining=valid.reduce((s,x)=>s+Number(x.amount||0),0);
 let transfer=seller+dld+commission+trustee+titleFee;
 let total=transfer+remaining;
 let size=[v("plot")?`Plot ${v("plot")}`:"",v("bua")?`BUA ${v("bua")}`:""].filter(Boolean).join(" · ");
 let phone=v("phone").replace(/\D/g,"");

 document.getElementById("presentation").innerHTML=`
 ${v("title")?`<div class="title">${v("title")}</div>`:""}

 <div class="details">
  ${detail("Project",v("project"))}
  ${detail("Developer",v("developer"))}
  ${detail("Area",v("area"))}
  ${detail("Type",v("type"))}
  ${detail("Bedrooms",v("bedrooms"))}
  ${detail("Bathrooms",v("bathrooms"))}
  ${detail("Size",size)}
  ${detail("Floor",v("floor"))}
  ${detail("View",v("view"))}
  ${detail("Completion",v("completion"))}
 </div>

 ${v("description")?`<div class="desc">${v("description")}</div>`:""}

 <div class="sectionTitle">Payment Breakdown</div>
 <div class="paymentBox">
  ${payRow("Unit Price",price,"payHead")}
  ${seller?payRow("Payment to Seller",seller):""}
  ${payRow("DLD Fee 4%",dld)}
  ${payRow("Trustee Office Fee",trustee)}
  ${payRow("Title Deed Fee",titleFee)}
  ${payRow("Brokerage Fee (2% + VAT)",commission)}
  ${valid.length?`<div class="payRow payGreen"><div class="payLabel">Remaining Payment Plan</div><div class="payAmount">${money(remaining)}</div></div>`:""}
  ${valid.map(x=>payRow(x.date,x.amount)).join("")}
  ${payRow("Total on Transfer",transfer,"payPink")}
  ${remaining?payRow("Total Remaining Payment Plan",remaining,"payGreen"):""}
  ${payRow("Total Cost for Buyer",total,"payHead")}
 </div>

 ${phone?`<a class="whatsappBtn" href="https://wa.me/${phone}" target="_blank">WhatsApp Now</a>`:""}

 ${mediaGrid("Floor Plans",floorPlans)}
 ${mediaGrid("Property Images",images)}
 `;
}

async function savePresentation(){
  if(!currentUser){alert("Please login first");return}

  generate();
  const form = collectForm();
  let slug = slugify(form.title || "property-presentation");

  const payload = {
    title: form.title,
    form: form,
    slug: slug,
    user_id: currentUser.id,
    is_public: true,
    updated_at: new Date().toISOString()
  };

  let result;

  if(currentId){
    result = await db.from("presentations").update(payload).eq("id",currentId).select().single();
  }else{
    result = await db.from("presentations").insert(payload).select().single();
  }

  if(result.error){
    alert(result.error.message);
    return;
  }

  currentId = result.data.id;
  const link = window.location.origin + "/" + result.data.slug;

  const box = document.getElementById("shareBox");
  box.classList.remove("hidden");
  box.innerHTML = `Client Link:<br><a href="${link}" target="_blank">${link}</a>`;
  navigator.clipboard.writeText(link);
  alert("Client link copied");
}

async function loadBySlug(slug){
  const {data,error} = await db.from("presentations").select("*").eq("slug",slug).single();
  if(error || !data) return false;

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("mainApp").classList.remove("hidden");
  document.querySelector(".panel").classList.add("hidden");
  currentId = data.id;
  fillForm(data.form);
  return true;
}

async function init(){
  const slug = window.location.pathname.replace("/","");
  if(slug){
    const loaded = await loadBySlug(slug);
    if(loaded) return;
  }

  const {data} = await db.auth.getSession();
  if(data.session){
    currentUser = data.session.user;
    showApp();
  }
  generate();
}

document.querySelectorAll("input,textarea").forEach(x=>x.addEventListener("input",generate));
init();
</script>

</body>
</html>
