<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property PDF Generator</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #111827;
      color: #111;
      padding: 20px;
    }

    .app {
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
    }

    .panel {
      background: #ffffff;
      border-radius: 14px;
      padding: 18px;
      height: fit-content;
    }

    h2 {
      margin-top: 0;
      font-size: 20px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
      display: block;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px;
    }

    .btn {
      background: #111827;
      color: #fff;
    }

    .btn-light {
      background: #e5e7eb;
      color: #111;
    }

    .btn-danger {
      background: #dc2626;
      color: #fff;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .installment-box,
    .label-box {
      border: 1px solid #e5e7eb;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      background: #f9fafb;
    }

    .preview-wrap {
      overflow-x: auto;
    }

    .page {
      width: 794px;
      min-height: 1123px;
      background: #fff;
      margin: 0 auto 20px;
      padding: 34px;
      position: relative;
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #111827;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin: 20px 0 10px;
      color: #111827;
      border-bottom: 2px solid #111827;
      padding-bottom: 6px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .detail-card {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px;
      min-height: 54px;
    }

    .detail-label {
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      font-weight: 700;
    }

    .detail-value {
      font-size: 14px;
      font-weight: 700;
      margin-top: 4px;
      color: #111827;
      word-break: break-word;
    }

    .breakdown-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 13px;
    }

    .breakdown-table th,
    .breakdown-table td {
      border: 1px solid #d1d5db;
      padding: 9px;
      text-align: left;
    }

    .breakdown-table th {
      background: #111827;
      color: #fff;
    }

    .plan-img {
      width: 100%;
      max-height: 440px;
      object-fit: contain;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      margin-bottom: 14px;
    }

    .images-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .property-img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    .thumb-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .thumb {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 6px;
      background: #f9fafb;
      cursor: grab;
    }

    .thumb img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
    }

    .thumb button {
      width: 100%;
      padding: 7px;
      font-size: 12px;
      margin-top: 6px;
    }

    .optional-note {
      font-size: 12px;
      color: #6b7280;
      margin-top: 4px;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .panel {
        display: none;
      }

      .app {
        display: block;
      }

      .page {
        margin: 0;
        page-break-after: always;
        width: 794px;
        min-height: 1123px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel">
      <h2>Property PDF Builder</h2>

      <label>Project</label>
      <input id="project" placeholder="Example: Farm Gardens" />

      <label>Area</label>
      <input id="area" placeholder="Example: The Valley" />

      <label>Property Type</label>
      <input id="type" placeholder="Example: Villa" />

      <div class="row">
        <div>
          <label>Bedrooms</label>
          <input id="beds" placeholder="5" />
        </div>
        <div>
          <label>Bathrooms</label>
          <input id="baths" placeholder="6" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>BUA</label>
          <input id="bua" placeholder="5,657 sq ft" />
        </div>
        <div>
          <label>Plot</label>
          <input id="plot" placeholder="10,008 sq ft" />
        </div>
      </div>

      <label>Price</label>
      <input id="price" placeholder="AED 7,500,000" />

      <label>Handover</label>
      <input id="handover" placeholder="Q4 2026" />

      <label>Description</label>
      <textarea id="description" placeholder="Short property description"></textarea>

      <div class="section-title">Custom Labels</div>
      <div id="labels"></div>
      <button class="btn-light" onclick="addLabel()">+ Add Label</button>

      <div class="section-title">Payment Breakdown</div>
      <div id="installments"></div>
      <button class="btn-light" onclick="addInstallment()">+ Add Installment</button>

      <div class="section-title">Floor Plan</div>
      <input type="file" id="floorPlan" accept="image/*,application/pdf" />

      <div class="section-title">Cluster Plan Optional</div>
      <input type="file" id="clusterPlan" accept="image/*,application/pdf" />
      <div class="optional-note">Leave empty if not required.</div>

      <div class="section-title">Pictures</div>
      <input type="file" id="imagesInput" accept="image/*" multiple />
      <div class="optional-note">Drag images below to arrange order.</div>
      <div id="thumbList" class="thumb-list"></div>

      <button class="btn" onclick="renderPDF()">Update Preview</button>
      <button class="btn" onclick="window.print()">Download PDF</button>
    </div>

    <div class="preview-wrap">
      <div id="preview"></div>
    </div>
  </div>

  <script>
    let propertyImages = [];
    let floorPlanData = null;
    let clusterPlanData = null;

    const fields = [
      "project",
      "area",
      "type",
      "beds",
      "baths",
      "bua",
      "plot",
      "price",
      "handover",
      "description"
    ];

    fields.forEach(id => {
      document.addEventListener("input", e => {
        if (e.target.id === id) renderPDF();
      });
    });

    function readFileAsDataURL(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    document.getElementById("floorPlan").addEventListener("change", async e => {
      const file = e.target.files[0];
      floorPlanData = file ? await readFileAsDataURL(file) : null;
      renderPDF();
    });

    document.getElementById("clusterPlan").addEventListener("change", async e => {
      const file = e.target.files[0];
      clusterPlanData = file ? await readFileAsDataURL(file) : null;
      renderPDF();
    });

    document.getElementById("imagesInput").addEventListener("change", async e => {
      const files = Array.from(e.target.files);

      for (const file of files) {
        const data = await readFileAsDataURL(file);
        propertyImages.push({
          id: Date.now() + Math.random(),
          src: data
        });
      }

      renderThumbs();
      renderPDF();
      e.target.value = "";
    });

    function addLabel() {
      const box = document.createElement("div");
      box.className = "label-box";
      box.innerHTML = `
        <label>Label Name</label>
        <input class="custom-label-name" placeholder="Example: View" oninput="renderPDF()" />

        <label>Value</label>
        <input class="custom-label-value" placeholder="Example: Park View" oninput="renderPDF()" />

        <button class="btn-danger" onclick="this.parentElement.remove(); renderPDF();">
          Remove Label
        </button>
      `;
      document.getElementById("labels").appendChild(box);
      renderPDF();
    }

    function addInstallment() {
      const box = document.createElement("div");
      box.className = "installment-box";
      box.innerHTML = `
        <label>Installment Title</label>
        <input class="installment-title" placeholder="Example: Booking" oninput="renderPDF()" />

        <div class="row">
          <div>
            <label>Percentage</label>
            <input class="installment-percent" placeholder="20%" oninput="renderPDF()" />
          </div>
          <div>
            <label>Amount</label>
            <input class="installment-amount" placeholder="AED 500,000" oninput="renderPDF()" />
          </div>
        </div>

        <button class="btn-danger" onclick="this.parentElement.remove(); renderPDF();">
          Remove Installment
        </button>
      `;
      document.getElementById("installments").appendChild(box);
      renderPDF();
    }

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function getCustomLabels() {
      const names = document.querySelectorAll(".custom-label-name");
      const values = document.querySelectorAll(".custom-label-value");
      const result = [];

      names.forEach((name, index) => {
        if (name.value.trim() || values[index].value.trim()) {
          result.push({
            label: name.value.trim(),
            value: values[index].value.trim()
          });
        }
      });

      return result;
    }

    function getInstallments() {
      const titles = document.querySelectorAll(".installment-title");
      const percents = document.querySelectorAll(".installment-percent");
      const amounts = document.querySelectorAll(".installment-amount");
      const result = [];

      titles.forEach((title, index) => {
        if (
          title.value.trim() ||
          percents[index].value.trim() ||
          amounts[index].value.trim()
        ) {
          result.push({
            title: title.value.trim(),
            percent: percents[index].value.trim(),
            amount: amounts[index].value.trim()
          });
        }
      });

      return result;
    }

    function renderThumbs() {
      const list = document.getElementById("thumbList");
      list.innerHTML = "";

      propertyImages.forEach((img, index) => {
        const div = document.createElement("div");
        div.className = "thumb";
        div.draggable = true;
        div.dataset.index = index;

        div.innerHTML = `
          <img src="${img.src}" />
          <button class="btn-danger" onclick="removeImage(${index})">Remove</button>
        `;

        div.addEventListener("dragstart", e => {
          e.dataTransfer.setData("text/plain", index);
        });

        div.addEventListener("dragover", e => {
          e.preventDefault();
        });

        div.addEventListener("drop", e => {
          e.preventDefault();

          const fromIndex = Number(e.dataTransfer.getData("text/plain"));
          const toIndex = Number(div.dataset.index);

          const movedImage = propertyImages.splice(fromIndex, 1)[0];
          propertyImages.splice(toIndex, 0, movedImage);

          renderThumbs();
          renderPDF();
        });

        list.appendChild(div);
      });
    }

    function removeImage(index) {
      propertyImages.splice(index, 1);
      renderThumbs();
      renderPDF();
    }

    function createDetailsHTML() {
      const defaultDetails = [
        ["Project", getValue("project")],
        ["Area", getValue("area")],
        ["Type", getValue("type")],
        ["Bedrooms", getValue("beds")],
        ["Bathrooms", getValue("baths")],
        ["BUA", getValue("bua")],
        ["Plot", getValue("plot")],
        ["Price", getValue("price")],
        ["Handover", getValue("handover")]
      ];

      const customDetails = getCustomLabels().map(item => [
        item.label,
        item.value
      ]);

      const allDetails = [...defaultDetails, ...customDetails];

      return `
        <div class="details-grid">
          ${allDetails
            .filter(item => item[0] || item[1])
            .map(
              item => `
                <div class="detail-card">
                  <div class="detail-label">${item[0] || "-"}</div>
                  <div class="detail-value">${item[1] || "-"}</div>
                </div>
              `
            )
            .join("")}
        </div>
      `;
    }

    function createBreakdownHTML() {
      const installments = getInstallments();

      if (!installments.length) return "";

      return `
        <div class="section-title">Payment Breakdown</div>
        <table class="breakdown-table">
          <thead>
            <tr>
              <th>Installment</th>
              <th>Percentage</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody>
            ${installments
              .map(
                item => `
                  <tr>
                    <td>${item.title || "-"}</td>
                    <td>${item.percent || "-"}</td>
                    <td>${item.amount || "-"}</td>
                  </tr>
                `
              )
              .join("")}
          </tbody>
        </table>
      `;
    }

    function createPlanPage(title, imgData) {
      if (!imgData) return "";

      return `
        <div class="page">
          <div class="page-title">${title}</div>
          <img src="${imgData}" class="plan-img" />
        </div>
      `;
    }

    function createImagesPages() {
      if (!propertyImages.length) return "";

      const pages = [];
      const imagesPerPage = 8;

      for (let i = 0; i < propertyImages.length; i += imagesPerPage) {
        const chunk = propertyImages.slice(i, i + imagesPerPage);

        pages.push(`
          <div class="page">
            <div class="page-title">Pictures</div>
            <div class="images-grid">
              ${chunk
                .map(img => `<img src="${img.src}" class="property-img" />`)
                .join("")}
            </div>
          </div>
        `);
      }

      return pages.join("");
    }

    function renderPDF() {
      const description = getValue("description");

      const firstPage = `
        <div class="page">
          <div class="page-title">
            ${getValue("project") || "Property Details"}
          </div>

          <div class="section-title">Property Details</div>
          ${createDetailsHTML()}

          ${
            description
              ? `
                <div class="section-title">Description</div>
                <p style="font-size:14px; line-height:1.6; color:#374151;">
                  ${description}
                </p>
              `
              : ""
          }

          ${createBreakdownHTML()}
        </div>
      `;

      const html = `
        ${firstPage}
        ${createPlanPage("Floor Plan", floorPlanData)}
        ${createPlanPage("Cluster Plan", clusterPlanData)}
        ${createImagesPages()}
      `;

      document.getElementById("preview").innerHTML = html;
    }

    addInstallment();
    renderPDF();
  </script>
</body>
</html>
