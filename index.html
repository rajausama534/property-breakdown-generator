<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Breakdown Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Georgia&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0b0f14;
      font-family: Poppins, sans-serif;
      color: #111827;
    }

    .app {
      display: grid;
      grid-template-columns: 430px 1fr;
      min-height: 100vh;
    }

    .panel {
      background: #111827;
      color: #fff;
      padding: 24px;
      overflow-y: auto;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .panel h1 {
      font-size: 22px;
      margin: 0 0 20px;
    }

    .section-title {
      margin: 22px 0 10px;
      font-size: 14px;
      color: #93c5fd;
      font-weight: 700;
      text-transform: uppercase;
    }

    label {
      font-size: 12px;
      color: #cbd5e1;
      display: block;
      margin-bottom: 5px;
    }

    input, textarea, select {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #fff;
      margin-bottom: 10px;
      font-family: Poppins, sans-serif;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 13px;
      border: 0;
      border-radius: 9px;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    button.secondary {
      background: #334155;
    }

    .preview-wrap {
      padding: 35px;
      overflow: auto;
    }

    #presentation {
      width: 900px;
      background: #fff;
      margin: auto;
      padding: 55px 70px;
      min-height: 1200px;
    }

    .top-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #2b2f33;
    }

    .date {
      color: #6b7280;
      font-size: 15px;
      margin-bottom: 30px;
    }

    .details {
      font-family: Georgia, serif;
      font-size: 23px;
      line-height: 1.9;
      font-weight: 700;
      font-style: italic;
      margin-left: 30px;
    }

    .details li {
      padding-left: 15px;
      margin-bottom: 10px;
    }

    hr {
      border: 0;
      border-top: 1px solid #cbd5e1;
      margin: 35px 120px;
    }

    .quote {
      font-family: Georgia, serif;
      font-size: 22px;
      line-height: 1.75;
      font-style: italic;
      border-left: 5px solid #111;
      padding-left: 22px;
      margin: 25px 0;
      color: #333;
    }

    .selling {
      font-family: Georgia, serif;
      font-size: 21px;
      margin: 20px 0 25px 28px;
    }

    .pay-title {
      font-size: 28px;
      font-weight: 800;
      margin: 25px 0 18px;
      color: #3b3f44;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 22px;
      font-family: Arial, sans-serif;
    }

    td {
      border: 1px solid #333;
      padding: 8px;
    }

    .gray {
      background: #d9d9d9;
      font-weight: 800;
    }

    .pink {
      background: #f8d6d3;
      font-weight: 800;
    }

    .green {
      background: #d6f0dd;
      font-weight: 800;
    }

    .bold {
      font-weight: 800;
    }

    .right {
      text-align: right;
    }

    .floor-plan, .image-grid {
      margin-top: 35px;
      page-break-inside: avoid;
    }

    .floor-plan img {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    .image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .image-grid img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 6px;
    }

    .section-heading {
      font-size: 28px;
      font-weight: 800;
      margin: 40px 0 18px;
      color: #2b2f33;
    }

    @media(max-width: 1000px) {
      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        position: relative;
        height: auto;
      }

      #presentation {
        width: 100%;
        padding: 35px 25px;
      }

      .preview-wrap {
        padding: 10px;
      }
    }
  </style>
</head>

<body>

<div class="app">

  <div class="panel">
    <h1>🔥 Property Breakdown Generator</h1>

    <div class="section-title">Heading</div>
    <label>Title</label>
    <input id="title" value="🔥 HOT LOT: 7-BR IN LAVITA - AMAN">

    <label>Date</label>
    <input id="date" value="March 03, 2026">

    <div class="section-title">Property Details</div>
    <label>Project</label><input id="project" value="Lavita - Aman">
    <label>Developer</label><input id="developer" value="Emaar">
    <label>Area</label><input id="area" value="The Oasis">
    <label>Type</label><input id="type" value="Villa · Single row">
    <label>Bedrooms</label><input id="bedrooms" value="7-BR">
    <label>Plot Size</label><input id="plot" value="33,657 sq.ft">
    <label>BUA</label><input id="bua" value="27,517 sq.ft">
    <label>Floor</label><input id="floor" value="B+G+1+R">
    <label>View</label><input id="view" value="Park & Lagoon">
    <label>Features</label><input id="features" value="Balcony · Parking · Pool ✔">
    <label>Handover</label><input id="handover" value="Q2 2027">

    <div class="section-title">About Property</div>
    <textarea id="about1">This villa was purchased exclusively for investment purposes, and its current price is considered a low price for such a large property in one of the most promising projects today by the developer Emaar.</textarea>
    <textarea id="about2">When compared to completed communities with a similar concept, Dubai Hills is a clear example where the price of the largest 7-bedroom villas starts at a much higher price per sq.ft.</textarea>
    <textarea id="about3">Upon resale after the full handover of the community, the expected value of the property may increase strongly, depending on market conditions, location, and demand.</textarea>

    <div class="section-title">Payment Breakdown</div>
    <label>Selling Price</label>
    <input id="price" type="number" value="67000000">

    <label>Payment to Seller</label>
    <input id="seller" type="number" value="33364068">

    <label>Installment 1 Date</label><input id="d1" value="2-APR-2026">
    <label>Installment 1 Amount</label><input id="a1" type="number" value="5605989">

    <label>Installment 2 Date</label><input id="d2" value="5-SEP-2026">
    <label>Installment 2 Amount</label><input id="a2" type="number" value="5605989">

    <label>Installment 3 Date</label><input id="d3" value="9-MAR-2027">
    <label>Installment 3 Amount</label><input id="a3" type="number" value="5605989">

    <label>Installment 4 Date</label><input id="d4" value="29-OCT-2027">
    <label>Installment 4 Amount</label><input id="a4" type="number" value="5605989">

    <label>Installment 5 Date</label><input id="d5" value="31-DEC-2028">
    <label>Installment 5 Amount</label><input id="a5" type="number" value="11211976">

    <div class="section-title">Floor Plan</div>
    <input type="file" id="floorUpload" accept="image/*">

    <div class="section-title">Property Images</div>
    <input type="file" id="imagesUpload" accept="image/*" multiple>

    <button onclick="generate()">Generate Preview</button>
    <button onclick="downloadPDF()" class="secondary">Download PDF</button>
  </div>

  <div class="preview-wrap">
    <div id="presentation"></div>
  </div>

</div>

<script>
  let floorPlanSrc = "";
  let propertyImages = [];

  function money(num) {
    return "AED " + Number(num || 0).toLocaleString("en-US", {
      maximumFractionDigits: 0
    });
  }

  document.getElementById("floorUpload").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
      floorPlanSrc = event.target.result;
      generate();
    };
    reader.readAsDataURL(file);
  });

  document.getElementById("imagesUpload").addEventListener("change", function(e) {
    propertyImages = [];
    const files = Array.from(e.target.files);

    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = function(event) {
        propertyImages.push(event.target.result);
        generate();
      };
      reader.readAsDataURL(file);
    });
  });

  function generate() {
    const title = document.getElementById("title").value;
    const date = document.getElementById("date").value;

    const project = document.getElementById("project").value;
    const developer = document.getElementById("developer").value;
    const area = document.getElementById("area").value;
    const type = document.getElementById("type").value;
    const bedrooms = document.getElementById("bedrooms").value;
    const plot = document.getElementById("plot").value;
    const bua = document.getElementById("bua").value;
    const floor = document.getElementById("floor").value;
    const view = document.getElementById("view").value;
    const features = document.getElementById("features").value;
    const handover = document.getElementById("handover").value;

    const about1 = document.getElementById("about1").value;
    const about2 = document.getElementById("about2").value;
    const about3 = document.getElementById("about3").value;

    const price = Number(document.getElementById("price").value || 0);
    const seller = Number(document.getElementById("seller").value || 0);

    const dld = price * 0.04 + 40;
    const trustee = 4200 + 580;
    const commission = price * 0.02;
    const commissionVat = commission * 0.05;
    const totalCommission = commission + commissionVat;

    const installments = [
      [document.getElementById("d1").value, Number(document.getElementById("a1").value || 0)],
      [document.getElementById("d2").value, Number(document.getElementById("a2").value || 0)],
      [document.getElementById("d3").value, Number(document.getElementById("a3").value || 0)],
      [document.getElementById("d4").value, Number(document.getElementById("a4").value || 0)],
      [document.getElementById("d5").value, Number(document.getElementById("a5").value || 0)]
    ];

    const remaining = installments.reduce((sum, item) => sum + item[1], 0);
    const totalTransfer = seller + dld + trustee + totalCommission;
    const totalCost = totalTransfer + remaining;

    const floorHtml = floorPlanSrc ? `
      <div class="section-heading">Floor Plan</div>
      <div class="floor-plan">
        <img src="${floorPlanSrc}">
      </div>
    ` : "";

    const imagesHtml = propertyImages.length ? `
      <div class="section-heading">Property Images</div>
      <div class="image-grid">
        ${propertyImages.map(src => `<img src="${src}">`).join("")}
      </div>
    ` : "";

    document.getElementById("presentation").innerHTML = `
      <div class="top-title">${title}</div>
      <div class="date">${date}</div>

      <ul class="details">
        <li>Project – ${project}</li>
        <li>Developer – ${developer}</li>
        <li>Area – ${area}</li>
        <li>Type – ${type}</li>
        <li>Bedrooms – ${bedrooms}</li>
        <li>Size – Plot ${plot} · BUA ${bua}</li>
        <li>Floor – ${floor}</li>
        <li>View – ${view}</li>
        <li>${features}</li>
        <li>Handover – ${handover}</li>
      </ul>

      <hr>

      <div class="quote">${about1}</div>
      <div class="quote">${about2}</div>
      <div class="quote">${about3}</div>

      <hr>

      <div class="selling">• Selling price: ${money(price)}</div>

      <div class="pay-title">📑PAYMENT PLAN (AED)</div>

      <table>
        <tr class="gray">
          <td>UNIT PRICE:</td>
          <td class="right">${money(price)}</td>
        </tr>

        <tr><td colspan="2">&nbsp;</td></tr>

        <tr class="pink">
          <td colspan="2">Payments on Transfer:</td>
        </tr>
        <tr>
          <td>1. Payment to seller</td>
          <td class="right">${money(seller)}</td>
        </tr>
        <tr>
          <td>2. DLD Transfer fee 4% + 40 AED</td>
          <td class="right">${money(dld)}</td>
        </tr>
        <tr>
          <td>3. Trustee fee + Title Deed</td>
          <td class="right">${money(trustee)}</td>
        </tr>
        <tr>
          <td>4. Buyer's agent commission 2% + 5% VAT</td>
          <td class="right">${money(totalCommission)}</td>
        </tr>

        <tr><td colspan="2">&nbsp;</td></tr>

        <tr class="green">
          <td colspan="2">Payment Plan:</td>
        </tr>

        ${installments.map(item => `
          <tr>
            <td>${item[0]}</td>
            <td class="right">${money(item[1])}</td>
          </tr>
        `).join("")}

        <tr><td colspan="2">&nbsp;</td></tr>

        <tr class="pink">
          <td>Total on Transfer:</td>
          <td class="right">${money(totalTransfer)}</td>
        </tr>
        <tr class="green">
          <td>Total remaining Payment Plan:</td>
          <td class="right">${money(remaining)}</td>
        </tr>
        <tr class="gray">
          <td>TOTAL COST FOR BUYER:</td>
          <td class="right">${money(totalCost)}</td>
        </tr>
      </table>

      ${floorHtml}
      ${imagesHtml}
    `;
  }

  function downloadPDF() {
    generate();

    const element = document.getElementById("presentation");

    const opt = {
      margin: 0,
      filename: 'property-breakdown.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'pt', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
  }

  generate();
</script>

</body>
</html>
