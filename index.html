<!DOCTYPE html>
<html>
<head>
<title>Property Breakdown</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: 'Arial', sans-serif; background:#0b0f17; color:#fff; padding:20px; }
.container { max-width:500px; margin:auto; }
input, textarea {
  width:100%; padding:12px; margin:8px 0;
  background:#111827; border:1px solid #333; color:#fff; border-radius:8px;
}
button {
  width:100%; padding:12px; margin-top:10px;
  background:#2563eb; border:none; color:#fff; border-radius:8px; cursor:pointer;
}
.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2 id="authTitle">Login</h2>

<div id="authBox">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" class="hidden">

<h3>Property</h3>
<input id="title" placeholder="Title">

<h3>Price</h3>
<input id="price" placeholder="Selling Price">

<button onclick="autoCalc()">Auto Calculate Fees</button>

<input id="dld" placeholder="DLD">
<input id="commission" placeholder="Brokerage Fee">
<input id="trustee" value="4200">
<input id="titleFee" value="550">

<h3>Description</h3>
<textarea id="desc"></textarea>

<h3>Phone (WhatsApp)</h3>
<input id="phone" placeholder="971XXXXXXXXX">

<button onclick="save()">Save & Generate Link</button>

<p id="linkBox"></p>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>

const supabase = supabase.createClient(
  "https://cowyowpcktpvnevrmfej.supabase.co",
  "sb_publishable_mM2UoFjMfo_eaUPkBd2Nmw_9KBPZEqh"
);

let user = null;
let currentId = null;

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const {data,error} = await supabase.auth.signInWithPassword({email,password});

  if(error){ alert(error.message); return; }

  user = data.user;
  showApp();
}

// LOGOUT
async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// CHECK SESSION
supabase.auth.getSession().then(res=>{
  if(res.data.session){
    user = res.data.session.user;
    showApp();
  }
});

// SHOW APP
function showApp(){
  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

// AUTO CALC
function autoCalc(){
  const price = parseFloat(document.getElementById("price").value) || 0;

  document.getElementById("dld").value = price * 0.04;
  document.getElementById("commission").value = price * 0.02 * 1.05;
}

// SAVE
async function save(){

  const data = {
    title: document.getElementById("title").value,
    price: document.getElementById("price").value,
    dld: document.getElementById("dld").value,
    commission: document.getElementById("commission").value,
    trustee: document.getElementById("trustee").value,
    titleFee: document.getElementById("titleFee").value,
    desc: document.getElementById("desc").value,
    phone: document.getElementById("phone").value
  };

  let result;

  if(currentId){
    result = await supabase.from("presentations")
    .update({form:data})
    .eq("id",currentId)
    .select();
  } else {
    result = await supabase.from("presentations")
    .insert({form:data, user_id:user.id})
    .select();
  }

  if(result.error){
    alert(result.error.message);
    return;
  }

  currentId = result.data[0].id;

  const link = window.location.origin + "?id=" + currentId;

  document.getElementById("linkBox").innerHTML =
    `<a href="${link}" target="_blank">${link}</a>`;
}

// LOAD FOR CLIENT
async function loadPublic(id){

  const {data,error} = await supabase
    .from("presentations")
    .select("*")
    .eq("id",id)
    .single();

  if(error){ return; }

  const f = data.form;

  document.body.innerHTML = `
  <div style="padding:20px;font-family:Arial;">
    <h1>${f.title}</h1>
    <p>Price: ${f.price}</p>
    <p>DLD: ${f.dld}</p>
    <p>Commission: ${f.commission}</p>
    <p>Trustee: ${f.trustee}</p>
    <p>Title Fee: ${f.titleFee}</p>
    <p>${f.desc}</p>
    <a href="https://wa.me/${f.phone}" target="_blank">
      Contact on WhatsApp
    </a>
  </div>`;
}

// CHECK URL
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

if(id){
  loadPublic(id);
}

</script>

</body>
</html>
